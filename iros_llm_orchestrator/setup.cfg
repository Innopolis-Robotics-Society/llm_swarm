[develop]
script_dir=$base/lib/iros_llm_orchestrator

[install]
install_scripts=$base/lib/iros_llm_orchestrator

# pytest discovery — tells colcon (and a bare `pytest` invocation) where
# to look for tests. Without this, pytest-style `def test_*()` functions
# in test/*.py can slip past the legacy `setup.py test` unittest fallback.
[tool:pytest]
testpaths = test
python_files = test_*.py
python_functions = test_*
