llm_decision_server:
  ros__parameters:
    # Backend: "mock" (heuristic, no GPU) | "http" (OpenAI-compatible) | "local" (transformers).
    llm_mode: "mock"

    # HTTP backend: OpenAI-compatible completions endpoint (vLLM / TGI / llama.cpp-server).
    llm_endpoint: "http://localhost:8000/v1/completions"
    llm_model: "nvidia/Nemotron-3-Nano-30B-A3B"

    llm_max_tokens: 256
    llm_temperature: 0.2

    # JSONL dataset grows here — one file per UTC day.
    dataset_path: "~/.ros/llm_decisions"

    # Hard cap on simultaneous inference calls (MAPF feedback can fire several times per second).
    max_concurrent: 1

    # If the backend does not answer within this many seconds, fall back to default_on_error.
    timeout_sec: 10.0

    # Safe default on ANY error (timeout, parse failure, transport): keep BT running.
    default_on_error: "wait"

    # How many last log_buffer lines to include in the prompt — more = noisier.
    log_tail: 20

llm_passive_observer:
  ros__parameters:
    # Channel 2 — proactive observer subscribed to /bt/state.
    llm_mode: "mock"
    llm_endpoint: "http://localhost:8000/v1/completions"
    llm_model: "nvidia/Nemotron-3-Nano-30B-A3B"
    llm_max_tokens: 512
    llm_temperature: 0.3

    # Ring buffer of recent BTState snapshots fed into the prompt.
    history_size: 20

    # Minimum seconds between two LLM triggers — WARN/ERROR states can be
    # sticky for several seconds and we must not flood inference.
    cooldown_sec: 10.0

    # Hard timeout for a single LLM call.
    timeout_sec: 15.0

    # JSONL dataset for channel 2 (kept separate from decisions).
    dataset_path: "~/.ros/llm_commands"

    # Kill-switch — flip via `ros2 param set` without restarting.
    # Default: false (channel 2 disabled). Override via launch arg
    # `enable_passive_observer:=true` or `ros2 param set ... enabled true`.
    enabled: false
