llm_decision_server:
  ros__parameters:
    # Backend: "mock" (heuristic, no GPU) | "ollama" (local Ollama) |
    #          "http" (OpenAI-compatible) | "local" (transformers).
    llm_mode: "http"

    # OpenAI-compatible HTTP backend.
    # Keep llm_api_key empty; the client reads the env var named by
    # llm_api_key_env. Never put real keys in this file.
    llm_endpoint: "https://api.groq.com/openai/v1/chat/completions"
    llm_model: "llama-3.3-70b-versatile"
    llm_api_key: ""
    llm_api_key_env: "LLM_API_KEY"
    llm_force_chat: true
    llm_enable_stop: false
    llm_max_tokens: 512
    llm_temperature: 0.1

    # Local alternatives:
    #   Ollama:
    #     llm_mode: "ollama"
    #     llm_endpoint: "http://localhost:11434/api/chat"
    #     llm_model: "mistral-small3.1"
    #   OpenRouter:
    #     llm_endpoint: "https://openrouter.ai/api/v1/chat/completions"
    #     llm_model: "meta-llama/llama-3.3-70b-instruct"
    #   Local vLLM:
    #     llm_endpoint: "http://localhost:8000/v1/chat/completions"
    #     llm_model: "nvidia/Nemotron-3-Nano-30B-A3B"
    #     llm_api_key: ""

    # JSONL dataset grows here — one file per UTC day.
    dataset_path: "~/.ros/llm_decisions"

    # Hard cap on simultaneous inference calls (MAPF feedback can fire several times per second).
    max_concurrent: 1

    # Safe default on ANY error (timeout, parse failure, transport): keep BT running.
    timeout_sec: 45.0
    default_on_error: "wait"

    # How many last log_buffer lines to include in the prompt — more = noisier.
    log_tail: 20

llm_passive_observer:
  ros__parameters:
    # Channel 2 — proactive observer subscribed to /bt/state.
    llm_mode: "http"
    llm_endpoint: "https://api.groq.com/openai/v1/chat/completions"
    llm_model: "llama-3.3-70b-versatile"
    llm_api_key: ""
    llm_api_key_env: "LLM_API_KEY"
    llm_force_chat: true
    llm_enable_stop: false
    llm_max_tokens: 1024
    llm_temperature: 0.1

    # Ring buffer of recent BTState snapshots fed into the prompt.
    history_size: 20

    # Minimum seconds between two LLM triggers — WARN/ERROR states can be
    # sticky for several seconds and we must not flood inference.
    cooldown_sec: 10.0

    # Hard timeout for a single LLM call.
    timeout_sec: 45.0

    # JSONL dataset for channel 2 (kept separate from decisions).
    dataset_path: "~/.ros/llm_commands"

    # Kill-switch — flip via `ros2 param set` without restarting.
    # Default: false (channel 2 disabled). Override via launch arg
    # `enable_passive_observer:=true` or `ros2 param set ... enabled true`.
    enabled: false

llm_chat_server:
  ros__parameters:
    # Channel 3 over ROS — /llm/chat action, used by the RViz panel.
    llm_mode: "http"
    llm_endpoint: "https://api.groq.com/openai/v1/chat/completions"
    llm_model: "llama-3.3-70b-versatile"
    llm_api_key: ""
    llm_api_key_env: "LLM_API_KEY"
    llm_force_chat: true
    llm_enable_stop: false
    llm_max_tokens: 2000
    llm_temperature: 0.1

    # LLM call timeout.
    timeout_sec: 60.0

    # Per-leaf BT mission timeout. A single MAPF goal across the map can take
    # ~1 minute with 20 robots; keep generous headroom for sequences.
    step_timeout_sec: 120.0

    # `map_name` is set at launch time from the active scenario's
    # `map_description` field — see orchestrator.launch.py.

llm_execute_server:
  ros__parameters:
    # Operator-confirmed plan replay — /llm/execute_plan action. No LLM call.
    step_timeout_sec: 120.0
    # `map_name` is set at launch time, see llm_chat_server above.
