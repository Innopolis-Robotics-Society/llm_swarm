name: amongus
description: >
  "The Skeld" — карта из игры Among Us, 66.6×37.75 м, 14 отсеков, соединённых
  узкими коридорами. Origin в центре карты (0,0). +X восток, +Y север.
  Совпадает с каноном Skeld: Реактор на крайнем западе, Навигация на крайнем
  востоке, Кафетерий — большой северо-центральный хаб.

