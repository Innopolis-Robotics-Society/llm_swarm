    coords: [2.7, 10.1]
    radius: 5.0
  - name: storage
    coords: [0.6, -10.9]
    radius: 3.0
  - name: reactor
    coords: [-28.4, 0.9]
    radius: 2.0

heuristics: |
  - The Skeld is a corridor map, not an open warehouse. Tight passages between
    rooms (e.g. MedBay ↔ Cafeteria, around Security, the entrance to Storage)
    cause MAPF deadlocks far more often than the warehouse map. Prefer staged
    moves (groups of ≤ 4) over moving the full fleet at once.
  - Goals must lie inside a free area. Coordinates outside
    x ∈ [-33.3, 33.3] or y ∈ [-18.875, 18.875] are invalid; coordinates inside
    walls will also fail. When unsure, route to a named_location instead of
    raw coordinates.
  - Cafeteria (free radius ≈ 5 m) is the only room that comfortably fits a
    full-fleet (10+) formation. Storage (≈ 3 m) handles ~6. Small rooms
    (Admin, O2, Security, Shields) fit only 2–3 robots before blocking the
    doorway — never request a formation there.
  - Reactor, Navigation, Weapons, and the two Engines are dead-end spurs:
    once a robot is inside, no other robot can pass through. Send multiple
    robots into a spur only if all of them are meant to stop there.
  - Cross-map routes (Reactor ↔ Navigation, Upper Engine ↔ Communications)
    are long and almost always pass through Cafeteria. Expect heavy
    contention at the Cafeteria exits during simultaneous transits — stagger
    departures by a few seconds.
  - If robot_stall grows in a corridor (typical hot spots: between Electrical
    and Storage, between MedBay and Cafeteria, the kink near Security)
    without arrived progress, replan — almost certainly a head-on deadlock,
    not a global infeasibility.