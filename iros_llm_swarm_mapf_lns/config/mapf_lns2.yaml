# Parameters for mapf_lns2 node.
# Values are starting points for a 20-robot warehouse; tune on your scenarios.

mapf_lns2:
  ros__parameters:
    use_sim_time: true
    # -------- Fleet / physics --------
    num_robots:               20
    time_step_sec:            0.5      # planning timestep (must match path_follower expectation)
    map_topic:               "/map"
    grid_resolution:          0.2      # meters / cell for the planner grid
    default_robot_radius:     0.22     # used when /published_footprint hasn't arrived yet
    inflation_radius:         0.3    # additional radius added to footprint
    max_speed:                0.5      # informational; not used by the solver directly
    goal_reached_m:           0.35     # arrival tolerance for "all done" check

    stall_timeout_sec:        4.0      # seconds without meaningful movement before stall
    stall_move_thresh_m:      0.15     # movement below this is "not moving"
    progress_log_interval_sec: 3.0    # periodic summary cadence; 0 disables

    empty_fails_before_unplanable: 6
    stall_iters_before_unplanable: 13

    # -------- LNS2 core --------
    collision_penalty:     10000       # >> horizon_steps; see soft_astar.hpp
    horizon_steps:           400       # hard upper bound; 400 * 0.5s = 200s of planning horizon
    max_astar_expansions: 900000       # per A* call for the initial mission solve;
                                       # gives later agents (crowded table) enough budget
    neighborhood_size:         8       # destroy set size; ~40% of fleet
    time_budget_ms:         10000      # wall time for repair_loop (initial solve); was 3000
    plateau_limit:           1500      # iters with no improvement -> stop; was 500
    segment_size:             50       # ALNS weight update period (iters)
    alns_reaction:             0.1
    diagonal_moves:        false       # 4-conn; MAPF-safer

    # Wall-clock cap for build_initial_solution during execute_goal.
    # Prevents pathological 35-second builds when robots are densely packed.
    # Remaining agents get no initial path and the repair loop handles them.
    initial_build_time_budget_ms: 6000

    # -------- Replan / warm-start --------
    replan_check_hz:           2.0
    replan_threshold_m:        2.0     # deviation distance that triggers replan
    replan_cooldown_sec:       2.0     # min gap between consecutive replans
    replan_time_budget_ms:  1500       # budget for both warm and cold replans (was 300 warm-only)
    replan_segment_size:       8       # ALNS weight update period for replans (was segment_size=50)
    replan_max_astar_expansions: 200000  # A* cap for cold replans (trigger_replan).
                                         # Lower than max_astar_expansions to keep
                                         # cold-replan latency under a few seconds.
    warm_start_enabled:     true
    warm_patch_radius_cells:  10       # how far actual pose can be from plan and still patch (was 2 = 0.4m)
    warm_max_collisions_per_agent: 4   # seed rejection threshold per agent (was 2)

    max_lives: 6
    unplanable_retry_delay_sec: 5.0
