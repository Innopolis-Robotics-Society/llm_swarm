amcl:
  ros__parameters:
    use_sim_time: true
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    max_particles: 500
    min_particles: 100
    update_min_a: 0.2
    update_min_d: 0.25
    set_initial_pose: true
    tf_buffer_duration: 30.0
    transform_tolerance: 0.5
    tf_broadcast: true
    global_frame_id: map
    odom_frame_id: "<robot_namespace>/odom"
    base_frame_id: "<robot_namespace>/base_link"
    scan_topic: base_scan
    map_topic: /map
    robot_model_type: "nav2_amcl::DifferentialMotionModel"

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 10.0
    controller_plugins: ["FollowPath"]
    goal_checker_plugins: ["goal_checker"]
    progress_checker_plugin: "progress_checker"

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      min_vel_x: 0.0
      max_vel_x: 0.5
      max_vel_theta: 1.0
      min_speed_xy: 0.0
      max_speed_xy: 0.5
      acc_lim_x: 1.0
      acc_lim_theta: 2.0
      decel_lim_x: -1.0
      decel_lim_theta: -2.0
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 0.02
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: "<robot_namespace>/odom"
      robot_base_frame: "<robot_namespace>/base_link"
      update_frequency: 20.0
      publish_frequency: 5.0
      robot_radius: 0.22
      #footprint: "[[0.20, 0.16], [0.20, -0.16], [-0.20, -0.16], [-0.20, 0.16]]"
      plugins: ["obstacle_layer", "inflation_layer"]
      rolling_window: True
      width: 8
      height: 8
      resolution: 0.05
      obstacle_layer:
        observation_persistence: 0.0  # 0 = препятствия живут только до следующего скана
        clearing: true
        marking: true
        plugin: "iros_llm_swarm_costmap_plugins/ResettingObstacleLayer"
        enabled: true
        observation_sources: base_scan
        base_scan:
          topic: "/<robot_namespace>/base_scan"
          data_type: "LaserScan"
          marking: true
          clearing: true
          obstacle_max_range: 4.0
          raytrace_max_range: 5.0
          max_obstacle_height: 2.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        cost_scaling_factor: 3.0
        inflation_radius: 0.5

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: map
      robot_base_frame: "<robot_namespace>/base_link"
      resolution: 0.05
      track_unknown_space: false
      robot_radius: 0.22
      transform_tolerance: 0.5
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        map_topic: /map
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.5

behavior_server:
  ros__parameters:
    use_sim_time: true
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"
