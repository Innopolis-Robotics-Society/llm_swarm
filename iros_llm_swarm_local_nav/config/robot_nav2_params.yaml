# nav2_params.yaml — переход с DWB на Regulated Pure Pursuit
#
# Мотивация
# =========
# DWB — reactive local planner. Он видит MAPF-путь как "совет", берёт
# свою косту с inflation'ами и придумывает собственные траектории
# основываясь на критиках (PathAlign, BaseObstacle и т.д.). При
# текущих весах (PathAlign=32, BaseObstacle=0.02) он игнорирует
# препятствия и ломится напролом; при высоких BaseObstacle — начинает
# выдумывать объезды, которых нет в MAPF-плане.
#
# Pure Pursuit следует полилинии буквально. Выбирает "carrot point"
# на lookahead_dist метров впереди по пути и поворачивает к нему.
# Никаких собственных траекторий. Это и нужно для MAPF.
#
# Regulated Pure Pursuit = Pure Pursuit + три регулятора:
#   1. curvature — замедление на крутых поворотах
#   2. proximity to obstacles — замедление вблизи препятствий в костмап
#   3. collision lookahead — прогнозирование коллизий вперёд
# Последние два дают базовое obstacle avoidance без отхода от пути.
#
# Применение: замени секцию controller_server целиком в своём
# nav2_params.yaml. Остальные секции (amcl, local_costmap, global_costmap,
# behavior_server) не меняй.


# =============================================================
# controller_server — DWB убрать, Regulated Pure Pursuit поставить
# =============================================================

controller_server:
  ros__parameters:
    use_sim_time: true

    # Controller частота. 10 Hz вполне хватает для Pure Pursuit
    # (у него нет тяжёлого траекторного sampling'а как у DWB).
    # Можно поднять до 20 если будет видно рваное движение.
    controller_frequency: 10.0

    # Пороги начала движения. Humble default'ы подходят.
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001

    # Прежние плагины (progress checker + goal checker) оставляем.
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
      stateful: True

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

      # --- Скорости ------------------------------------------------
      # desired_linear_vel — крейсерская скорость. Это имя параметра
      # в Humble (в Jazzy/Rolling её переименовали в max_linear_vel).
      # Держим 0.5 как раньше для DWB max_vel_x.
      desired_linear_vel: 0.5
      # Минимум при approach / regulation. Не опускаться ниже этого.
      min_approach_linear_velocity: 0.05
      # Расстояние до цели при котором начинаем замедляться.
      approach_velocity_scaling_dist: 0.6

      # --- Lookahead ----------------------------------------------
      # lookahead_dist — радиус "carrot". Меньше = жёстче трекинг
      # пути, но дёрганее. Больше = плавнее, но срезает углы.
      # Для 0.2м клеток MAPF 0.6м (3 клетки вперёд) — разумный
      # компромисс.
      lookahead_dist: 0.6
      min_lookahead_dist: 0.3
      max_lookahead_dist: 0.9
      # Если включить use_velocity_scaled_lookahead_dist, lookahead
      # масштабируется по текущей скорости (v * lookahead_time).
      # Для multi-robot это не нужно — пусть будет фиксированный.
      use_velocity_scaled_lookahead_dist: false
      lookahead_time: 1.5

      # --- Regulation heuristics ----------------------------------
      # Замедляться на крутых поворотах — полезно, MAPF-пути с
      # диагоналями могут давать резкие повороты.
      use_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.25

      # Замедляться вблизи препятствий — ВАЖНО для multi-robot:
      # другой робот в costmap вызовет плавный slow-down вместо
      # того чтобы просто воткнуться в него.
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: true
      cost_scaling_dist: 0.6
      cost_scaling_gain: 1.0
      inflation_cost_scaling_factor: 2.0
      min_distance_to_obstacle: 0.10

      # --- Collision avoidance ------------------------------------
      # Проверка коллизий вперёд: симулируем прогноз на N секунд и
      # если он упирается в препятствие — останавливаемся. Без этого
      # Pure Pursuit действительно "тупо пойдёт в стену".
      use_collision_detection: true
      # В Humble параметр называется так. Если colcon ругается, что
      # такого параметра нет, замени на max_allowed_time_to_collision.
      max_allowed_time_to_collision_up_to_carrot: 0.7

      # --- Rotate to heading -------------------------------------
      # Если робот развернут не в ту сторону от пути, сперва
      # повернуться на месте. Для differential drive это нужно.
      use_rotate_to_heading: true
      rotate_to_heading_min_angle: 0.785   # 45° — меньше этого не крутим
      rotate_to_heading_angular_vel: 1.8
      max_angular_accel: 3.2
      allow_reversing: false

      # --- Разное -------------------------------------------------
      transform_tolerance: 0.1
      # Если conjunction c goal checker'ом: после x/y tolerance
      # повернёт к heading цели. Для MAPF heading в цели
      # неважен — оставляем false, чтоб не тратить время.
      # Примечание: rotate_to_goal_heading — это из Rotation Shim,
      # здесь мы его не используем.


local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: "<robot_namespace>/odom"
      robot_base_frame: "<robot_namespace>/base_link"
      update_frequency: 20.0
      publish_frequency: 5.0
      robot_radius: 0.22
      #footprint: "[[0.20, 0.16], [0.20, -0.16], [-0.20, -0.16], [-0.20, 0.16]]"
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      rolling_window: True
      width: 8
      height: 8
      resolution: 0.05
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        map_topic: /map
      obstacle_layer:
        observation_persistence: 0.0  # 0 = препятствия живут только до следующего скана
        clearing: true
        marking: true
        plugin: "iros_llm_swarm_costmap_plugins/ResettingObstacleLayer"
        enabled: true
        observation_sources: base_scan
        base_scan:
          topic: "/<robot_namespace>/base_scan"
          data_type: "LaserScan"
          marking: true
          clearing: true
          obstacle_max_range: 4.0
          raytrace_max_range: 5.0
          max_obstacle_height: 2.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        cost_scaling_factor: 3.0
        inflation_radius: 0.40

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: map
      robot_base_frame: "<robot_namespace>/base_link"
      resolution: 0.05
      track_unknown_space: false
      robot_radius: 0.22
      transform_tolerance: 0.5
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        map_topic: /map
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.5

behavior_server:
  ros__parameters:
    use_sim_time: true
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"
